{% extends 'base.html' %}
{% block content %}
    <h1>Home</h1>
    {% if user.is_authenticated %}
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Выход</button>
    </form>
    {% else %}
    <a href="{% url 'login' %}">Вход</a>|<a href="{% url 'register' %}">Регистрация</a>
    {% endif%}
{% endblock %}
