{% extends 'base.html' %}
{% block content %}
<h1>Login</h1>
       {% if form.errors %}
          {{ form.errors.error }}
       {% endif%}
<form action="{% url 'login' %}" method="post">
    {% csrf_token %}
    {{ form }}
    <button type="submit" class="btn btn-succes">submit</button>
</form>
<a href="{% url 'password_reset' %}">Forgot password?</a>
{% endblock %}
