{% extends 'base.html' %}
{% block content %}
<h1>Products</h1>
<table>
    <thead><th>Название</th><th>Цена</th><th></th></thead>
    {% for product in products%}
    <tr>
        <td> {{ product.name }} </td>
        <td> {{ product.price }} рублей</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
